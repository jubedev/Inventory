services:
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: always
    environment:
      MYSQL_DATABASE: gsa_inventory_db
      MYSQL_USER: admingsa
      MYSQL_PASSWORD: 13128
      MYSQL_ROOT_PASSWORD: 13128-*/.
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: admingsa
      PMA_PASSWORD: 13128
      MYSQL_ROOT_PASSWORD: 13128-*/.
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
